services:
  roundcube:
    image: roundcube/roundcubemail:latest
    container_name: mailcowdockerized-roundcube
    restart: always
    depends_on:
      - mysql-mailcow
      - dovecot-mailcow
      - postfix-mailcow
    environment:
      - ROUNDCUBEMAIL_DB_TYPE=mysql
      - ROUNDCUBEMAIL_DB_HOST=mysql-mailcow
      - ROUNDCUBEMAIL_DB_PORT=3306
      - ROUNDCUBEMAIL_DB_USER=roundcube
      - ROUNDCUBEMAIL_DB_PASSWORD=roundcube_secret_2026
      - ROUNDCUBEMAIL_DB_NAME=roundcubemail
      - ROUNDCUBEMAIL_DEFAULT_HOST=tls://dovecot-mailcow
      - ROUNDCUBEMAIL_DEFAULT_PORT=143
      - ROUNDCUBEMAIL_SMTP_SERVER=tls://postfix-mailcow
      - ROUNDCUBEMAIL_SMTP_PORT=587
      - ROUNDCUBEMAIL_SKIN=elastic
      - ROUNDCUBEMAIL_PLUGINS=archive,zipdownload,managesieve,password,markasjunk
      - ROUNDCUBEMAIL_UPLOAD_MAX_FILESIZE=50M
      - ROUNDCUBEMAIL_REQUEST_PATH=/mail/
    volumes:
      - roundcube-data:/var/roundcube
      - /opt/mailcow-dockerized/data/conf/roundcube/custom.inc.php:/var/roundcube/config/custom.inc.php:ro
      - /opt/mailcow-dockerized/data/conf/roundcube/custom-assets:/var/www/html/custom-assets:ro
      - /opt/mailcow-dockerized/data/conf/roundcube/custom-assets/plugins/novaframe_theme:/var/www/html/plugins/novaframe_theme:ro
      - /opt/mailcow-dockerized/data/conf/roundcube/apache-custom.conf:/etc/apache2/conf-enabled/custom-assets.conf:ro
    networks:
      mailcow-network:
        aliases:
          - roundcube

volumes:
  roundcube-data:

networks:
  mailcow-network:
    name: mailcowdockerized_mailcow-network
    external: true
